name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntax-check every JS file (node --check)
        run: |
          # Syntax-only gate for the Stimulus controllers + JS entrypoints.
          # No bundler/runtime — just parse each file so a broken controller
          # can't merge. node --check auto-detects the ESM `import` syntax.
          find app -name "*.js" -print0 | xargs -0 -I{} -n1 node --check {}

  system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: System tests (Capybara + Cuprite against test/dummy)
        # Headless Chrome comes preinstalled on ubuntu-latest; Cuprite talks
        # CDP directly, so no selenium/chromedriver setup is needed.
        run: bundle exec rake test:system

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Lint
        run: bundle exec rubocop
      - name: Test
        run: bundle exec rake test
      - name: Build gem (asserts assets are packaged)
        run: |
          gem build phlex_kit.gemspec
          # A .gem is a plain tar holding data.tar.gz; extract that member to
          # stdout and check the component CSS ships (bare tar -tzf fails here).
          contents=$(tar -xOf phlex_kit-*.gem data.tar.gz | tar -tz)
          echo "$contents" | grep -q "app/components/phlex_kit/badge/badge.css"
          echo "$contents" | grep -q "app/components/phlex_kit/toast/toast.css"
          echo "$contents" | grep -q "app/assets/stylesheets/phlex_kit/phlex_kit.css"
